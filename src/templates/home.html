<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Progress</title>

    <style>
        body {
            background: linear-gradient(to bottom, #219ccd, #97dde8);
            margin: 0px;
            height: 100%;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 545px;
            background-color: #0148B2;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .controls-topbar {
            width: 400px;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .controls-topbar span {
            font-family: 'Trebuchet MS';
            color: white;
            font-weight: bold;
            margin-left: 5px;
        }

        .controls-content {
            background-color: #EBEBEE;
            width: 370px;
            height: 490px;
            margin: 0px 5px 5px 5px;
            padding: 10px;
        }

        .controls-buttons {
            margin-bottom: 10px;
            overflow-y: scroll;
            height: 420px;
        }

        .control {
            border: 1px dashed black;
            border-radius: 5px;
            margin: 5px;
            width: 340px;
            height: 90px;
        }

        .details {
            height: 50px;
            padding: 5px;
        }

        .details .scriptDescription {
            font-size: small;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .clear-button {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clear-button #clearButton {
            width: 350px;
            height: 30px;
        }

        .message {
            display: flex;
            width: 750px;
            height: 40px;
            align-items: center;
            color: white;
            background-color: black;
            margin-bottom: 5px;
            border-radius: 5px;
            font-family: Tahoma;
        }

        .message span {
            padding: 0px 5px 0px 5px;
        }

        .window {
            display: block;
            width: 750px;
            height: 500px;
            background-color: #0148B2;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .window-topbar {
            width: 750px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .window-topbar span {
            font-family: 'Trebuchet MS';
            color: white;
            font-weight: bold;
            margin-left: 5px;
        }

        .window-content {
            background-color: #EBEBEE;
            width: 740px;
            margin: 0px 5px 0px 5px;
            font-family: Tahoma;
            font-weight: normal;
        }

        .window .table-head {
            display: block;
            width: 740px;
            height: 30px;
            padding: 5px 5px 0px 5px;
        }

        .window .table-body {
            display: block;
            width: 740px;
            height: 435px;
            overflow-y: scroll;
            padding: 0px 5px 5px 5px;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="controls">
            <div class="controls-topbar">
                <span>Controls</span>
            </div>

            <div class="controls-content">
                <div class="button">
                    <button type="click" onclick="window.location.href='/others'">Button to Others</button>
                </div>

                <div class="controls-buttons">
                    {% for script in scripts %}
                    <div class="control">
                        <div class="details">
                            <div class="scriptTitle">
                                <span class="scriptIndicator" data-script-id="{{ script.id }}"></span>
                                {{ script.name }}
                            </div>
                            <div class="scriptDescription">{{ script.description }}</div>
                        </div>
                        <div class="buttons">

                            <button type="button" class="startButton" data-script-id="{{ script.id }}"
                                data-script-name="{{ script.name }}">
                                Start Script
                            </button>

                            <button type="button" class="stopButton" data-script-id="{{ script.id }}"
                                data-script-name="{{ script.name }}">
                                Stop Script
                            </button>

                            <button type="button" class="showButton" data-script-id="{{ script.id }}"
                                data-script-name="{{ script.name }}">
                                Show Script
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="clear-button">
                    <button type="button" id="clearButton">Clear</button>
                </div>
            </div>
        </div>

        <div class="logs" style="text-align: left;">
            <div class="message">
                <span id="message">Message: </span>
            </div>

            <!-- window that contains the table -->
            <div class="window">
                <div class="window-topbar">
                    <span id="windowTitle">Running Script</span>
                </div>

                <div class="window-content">
                    <table class="table-head">
                        <thead>
                            <tr>
                                <th style="width: 200px;">Timestamp</th>
                                <th style="width: 510px;">Event</th>
                            </tr>
                        </thead>
                    </table>

                    <table class="table-body">
                        <tbody id="table-content"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function pollScriptIndicator() {
            document.querySelectorAll(".scriptIndicator").forEach(async function (span) {
                const response = await fetch("/worker-status/" + span.dataset.scriptId);
                if (!response.ok) { // error with the script ID
                    span.textContent = "🔴";
                }

                const result = await response.json();
                if (result.status === 0) {
                    span.textContent = "🟢"; // script is running
                } else {
                    span.textContent = "🟡"; // script has stopped
                }
            });
        }
        setInterval(pollScriptIndicator, 5000); // keep refreshing every 500ms


        function renderEvents(events) {
            const fragment = document.createDocumentFragment(); // batch DOM writes

            events.forEach((event, _) => {
                const [timestamp, log] = event.split("|");

                const tr = document.createElement("tr");

                const td1 = document.createElement("td");
                td1.textContent = timestamp;
                td1.style = "width: 200px;"

                const td2 = document.createElement("td");
                td2.textContent = log;

                tr.appendChild(td1);
                tr.appendChild(td2);
                fragment.prepend(tr);
            });
            document.getElementById("table-content").prepend(fragment);
        }



        let intervalId = null;
        let state = "-1";
        let start = 0;
        async function poll() {
            // no need to poll if UI state is empty
            if (state === "-1") return;

            // get the events based on the script id
            const response = await fetch("/poll/" + state + "?start=" + start);
            const result = await response.json();

            start = result.end;
            renderEvents(result.events);

            // the reason this is called here is because when the script has finished
            // the only function that is running on interval is this function
            // hence, this function also checks for script status in case it has finished
            // get the status of the script (running, error or stopped)
            const response2 = await fetch("/worker-status/" + state);
            const result2 = await response2.json();

            // stop polling if script has stopped or in error
            if (result2.status !== 0) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }



        async function startPolling() {

            poll(); // initial poll

            // check if the script is running
            const response = await fetch("/worker-status/" + state);
            const result = await response.json();

            // call polling on an interval if script is running
            if (result.status === 0) {
                clearInterval(intervalId);
                intervalId = setInterval(poll, 1000);
            }
        }



        document.querySelectorAll(".showButton").forEach(btn => {
            btn.addEventListener("click", async function (event) {
                event.preventDefault(); // prevent default button behaviour

                // to prevent showing twice or duplicate showing
                if (state !== btn.dataset.scriptId) {

                    // clear whatever is existing on the UI
                    document.getElementById("table-content").textContent = "";

                    // UI state is now based on the script id
                    document.getElementById("windowTitle").textContent = btn.dataset.scriptName;
                    state = btn.dataset.scriptId;
                    start = 0;

                    // start polling
                    startPolling();
                }
            });
        });



        document.querySelectorAll(".startButton").forEach(btn => {
            btn.addEventListener("click", async function (event) {
                event.preventDefault();

                btn.disabled = true;

                // start the worker
                const response = await fetch("/start-worker/" + btn.dataset.scriptId, { method: "POST", });
                const result = await response.json();
                if (!response.ok) {
                    // show message
                    // do nothing
                    // UI remains unchanged
                    document.getElementById("message").textContent = "Message: Error: " + result.message;
                }

                // to prevent showing the same events twice
                // preventing duplicate showing
                if (state !== btn.dataset.scriptId) {

                    // wait until script has fully started
                    if (result.status === 'ok') {

                        // clear whatever is existing on the UI
                        document.getElementById("table-content").textContent = "";

                        // update message
                        document.getElementById("message").textContent = "Message: " + result.message;

                        // UI state is now based on the script id
                        document.getElementById("windowTitle").textContent = btn.dataset.scriptName;
                        state = btn.dataset.scriptId;
                        start = 0;
                    }
                }
                // reenable button
                btn.disabled = false;

                // start polling
                startPolling();
            });
        });



        document.querySelectorAll(".stopButton").forEach(btn => {
            btn.addEventListener("click", async function (event) {
                event.preventDefault();

                // stop the worker
                const response = await fetch("/stop-worker/" + btn.dataset.scriptId, { method: "POST", });
                const result = await response.json();
                if (!response.ok) {
                    // show message
                    // do nothing
                    // UI remains unchanged
                    document.getElementById("message").textContent = "Message: Error: " + result.message;
                } else {
                    document.getElementById("message").textContent = "Message: " + result.message;
                }
            });
        });



        document.getElementById("clearButton").addEventListener("click", async function (event) {
            event.preventDefault();
            document.getElementById("table-content").textContent = "";
            document.getElementById("windowTitle").textContent = "Running Script";
            document.getElementById("message").textContent = "Message: ";
            state = "-1";
            start = 0;

            clearInterval(intervalId);
            intervalId = null;
        });
    </script>
</body>

</html>
